# python -m esphome run "X:\ESP32-C6-Irrigation-Controller\firmware\V2_Smart_Irrigation\irribrant_v2.yaml"


# =========================================================
# irriBRANT v2
# ESP32-C6 Irrigation Controller
# =========================================================

# =========================================================
# ESPHOME
# =========================================================

esphome:
  name: irribrant-v2
  friendly_name: irriBRANT v2

  on_boot:
    priority: 600
    then:
      - light.turn_on:
          id: status_led
          red: 100%
          green: 80%
          blue: 0%
          effect: "Yellow Fast Pulse"

# =========================================================
# ESP32
# =========================================================

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6

  framework:
    type: esp-idf

# =========================================================
# LOGGER
# =========================================================

logger:

# =========================================================
# API
# =========================================================

api:

# =========================================================
# OTA
# =========================================================

ota:
  - platform: esphome

    on_begin:
      then:
        - light.turn_on:
            id: status_led
            red: 0%
            green: 100%
            blue: 100%
            effect: "Cyan Pulse"

# =========================================================
# WIFI
# =========================================================

wifi:
  ssid: "BrantHome_IoT"
  password: "Naointeressa24"

  ap:
    ssid: "irriBRANT Fallback"
    password: "irribrant123"

  on_connect:
    then:
      - logger.log: "WiFi Connected"

  on_disconnect:
    then:
      - logger.log: "WiFi Disconnected"

# =========================================================
# WEB SERVER
# =========================================================

web_server:
  port: 80

# =========================================================
# DIAGNOSTICS
# =========================================================

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"

# =========================================================
# I2C
# =========================================================

i2c:
  sda: GPIO23
  scl: GPIO16

  frequency: 50000 Hz

  scan: true

# =========================================================
# MCP23017
# =========================================================

mcp23017:
  - id: mcp23017_hub
    address: 0x20

# =========================================================
# ZONE OUTPUTS
# =========================================================

switch:

  # ZONE 1 (GPB0)
  - platform: gpio
    id: zone_1_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 8
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 2 (GPA7)
  - platform: gpio
    id: zone_2_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 7
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 3 (GPA6)
  - platform: gpio
    id: zone_3_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 6
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 4 (GPA5)
  - platform: gpio
    id: zone_4_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 5
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 5 (GPA4)
  - platform: gpio
    id: zone_5_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 4
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 6 (GPA3)
  - platform: gpio
    id: zone_6_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 3
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 7 (GPA2)
  - platform: gpio
    id: zone_7_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 2
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 8 (GPA1)
  - platform: gpio
    id: zone_8_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 1
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 9 (GPA0)
  - platform: gpio
    id: zone_9_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 0
    restore_mode: ALWAYS_OFF
    internal: true

## =========================================================
# VALVES
# =========================================================

valve:

  - platform: template
    name: "Zone 1"
    id: valve_zone_1

    lambda: |-
      return id(zone_1_output).state;

    optimistic: false
    assumed_state: false

    open_action:
      - switch.turn_on: zone_1_output

    close_action:
      - switch.turn_off: zone_1_output

  - platform: template
    name: "Zone 2"
