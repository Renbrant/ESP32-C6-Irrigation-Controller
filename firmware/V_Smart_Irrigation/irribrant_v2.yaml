# =========================================================
# RGB STATUS LED
# =========================================================

output:
  - platform: ledc
    pin: GPIO1
    id: red_output

  - platform: ledc
    pin: GPIO0
    id: green_output

  - platform: ledc
    pin: GPIO2
    id: blue_output

light:
  - platform: rgb
    id: status_led
    name: "Status LED"

    red: red_output
    green: green_output
    blue: blue_output

    restore_mode: ALWAYS_OFF

    effects:

      # READY / WIFI CONNECTED
      - pulse:
          name: "Green Pulse"
          transition_length: 1s
          update_interval: 1s
          min_brightness: 15%
          max_brightness: 100%

      # WIFI DISCONNECTED
      - pulse:
          name: "Red Pulse"
          transition_length: 500ms
          update_interval: 500ms
          min_brightness: 5%
          max_brightness: 100%

      # BOOTING
      - pulse:
          name: "Yellow Fast Pulse"
          transition_length: 250ms
          update_interval: 250ms
          min_brightness: 10%
          max_brightness: 100%

      # OTA
      - pulse:
          name: "Cyan Pulse"
          transition_length: 300ms
          update_interval: 300ms
          min_brightness: 20%
          max_brightness: 100%

# =========================================================
# STATUS ENGINE
# =========================================================

interval:
  - interval: 2s
    then:

      # WIFI CONNECTED
      - if:
          condition:
            wifi.connected

          then:

            # ANY VALVE OPEN?
            - if:
                condition:
                  or:
                    - switch.is_on: zone_1_output
                    - switch.is_on: zone_2_output
                    - switch.is_on: zone_3_output
                    - switch.is_on: zone_4_output
                    - switch.is_on: zone_5_output
                    - switch.is_on: zone_6_output
                    - switch.is_on: zone_7_output
                    - switch.is_on: zone_8_output
                    - switch.is_on: zone_9_output

                then:

                  # IRRIGATING
                  - light.turn_on:
                      id: status_led
                      red: 0%
                      green: 0%
                      blue: 100%
                      brightness: 100%
                      effect: none

                else:

                  # READY / IDLE
                  - light.turn_on:
                      id: status_led
                      red: 0%
                      green: 100%
                      blue: 0%
                      brightness: 100%
                      effect: "Green Pulse"

          else:

            # WIFI DISCONNECTED
            - light.turn_on:
                id: status_led
                red: 100%
                green: 0%
                blue: 0%
                brightness: 100%
                effect: "Red Pulse"