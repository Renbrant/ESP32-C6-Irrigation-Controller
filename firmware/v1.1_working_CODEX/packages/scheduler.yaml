select:

  - platform: template
    id: program_a_frequency
    name: "Program A Frequency"
    optimistic: true
    restore_value: true
    options:
      - "Selected Weekdays"
      - "Daily"
      - "Every 2 Days"
      - "Every 3 Days"
    initial_option: "Daily"

  - platform: template
    id: program_b_frequency
    name: "Program B Frequency"
    optimistic: true
    restore_value: true
    options:
      - "Selected Weekdays"
      - "Daily"
      - "Every 2 Days"
      - "Every 3 Days"
    initial_option: "Daily"

  - platform: template
    id: program_c_frequency
    name: "Program C Frequency"
    optimistic: true
    restore_value: true
    options:
      - "Selected Weekdays"
      - "Daily"
      - "Every 2 Days"
      - "Every 3 Days"
    initial_option: "Daily"

number:

  - platform: template
    id: program_a_hour
    name: "Program A Hour"
    optimistic: true
    restore_value: true
    min_value: 0
    max_value: 23
