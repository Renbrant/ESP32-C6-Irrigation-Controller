esphome:
  name: irribrant-pro
  friendly_name: irriBRANT PRO

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

#enable logging
logger:

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  ap:
    ssid: "Irribrant Fallback"
    password: "12345678"

captive_portal:

# =========================
# TIME
# =========================
time:
  - platform: sntp
    id: sntp_time
    timezone: "America/Denver"
    on_time:
      - seconds: 0
        then:
          - script.execute: scheduler_logic

# =========================
# GLOBAL
# =========================
globals:
  - id: last_run_minute
    type: int
    restore_value: no
    initial_value: '-1'

# =========================
# CONFIG
# =========================
number:
  - platform: template
    id: rain_delay
    name: "Rain Delay (horas)"
    min_value: 0
    max_value: 72
    step: 1
    initial_value: 0
    optimistic: true

# =========================
# TIME CONFIG
# =========================
datetime:
  - platform: template
    id: prog_a_time1
    type: time
    name: "Programa A - Start"
    initial_value: "06:00:00"
    optimistic: true

# =========================
# SWITCHES
# =========================
switch:
  - platform: template
    id: master_enable
    name: "Sistema Ativo"
    optimistic: true

  - platform: template
    id: prog_a_enable
    name: "Programa A"
    optimistic: true

  - platform: template
    id: mon
    name: "Segunda"
    optimistic: true
  - platform: template
    id: tue
    name: "Terça"
    optimistic: true
  - platform: template
    id: wed
    name: "Quarta"
    optimistic: true
  - platform: template
    id: thu
    name: "Quinta"
    optimistic: true
  - platform: template
    id: fri
    name: "Sexta"
    optimistic: true
  - platform: template
    id: sat
    name: "Sábado"
    optimistic: true
  - platform: template
    id: sun
    name: "Domingo"
    optimistic: true

  # GPIO seguros
  - platform: gpio
    id: zone_1
    name: "Saída 1"
    pin:
      number: GPIO0
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: zone_2
    name: "Saída 2"
    pin:
      number: GPIO1
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: zone_3
    name: "Saída 3"
    pin:
      number: GPIO2
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: zone_4
    name: "Saída 4"
    pin:
      number: GPIO3
      inverted: true
    restore_mode: ALWAYS_OFF

  - platform: gpio
    id: zone_5
    name: "Saída 5"
    pin:
      number: GPIO6
      inverted: true
    restore_mode: ALWAYS_OFF

# =========================
# SPRINKLER
# =========================
sprinkler:
  - id: irribrant_ctrl
    main_switch: "Irrigação"
    auto_advance_switch: "Auto Avanço"
    valves:
      - valve_switch: "V1"
        valve_switch_id: zone_1
        run_duration: 5min
      - valve_switch: "V2"
        valve_switch_id: zone_2
        run_duration: 5min
      - valve_switch: "V3"
        valve_switch_id: zone_3
        run_duration: 5min
      - valve_switch: "V4"
        valve_switch_id: zone_4
        run_duration: 5min
      - valve_switch: "V5"
        valve_switch_id: zone_5
        run_duration: 5min

# =========================
# SCHEDULER
# =========================
script:
  - id: scheduler_logic
    then:
      - lambda: |-
          auto now = id(sntp_time).now();

          if (!now.is_valid()) return;

          int current_minute = now.hour * 60 + now.minute;
          if (id(last_run_minute) == current_minute) return;

          if (!id(master_enable).state) return;
          if (!id(prog_a_enable).state) return;
          if (id(rain_delay).state > 0) return;

          bool day_ok =
            (now.day_of_week == 2 && id(mon).state) ||
            (now.day_of_week == 3 && id(tue).state) ||
            (now.day_of_week == 4 && id(wed).state) ||
            (now.day_of_week == 5 && id(thu).state) ||
            (now.day_of_week == 6 && id(fri).state) ||
            (now.day_of_week == 7 && id(sat).state) ||
            (now.day_of_week == 1 && id(sun).state);

          if (!day_ok) return;

          if (now.hour == id(prog_a_time1).hour &&
              now.minute == id(prog_a_time1).minute) {

            id(last_run_minute) = current_minute;
            id(irribrant_ctrl).start_full_cycle();
          }
          
web_server:
  port: 80