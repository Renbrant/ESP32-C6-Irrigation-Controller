type: sections
max_columns: 4
title: Garden
path: garden
icon: mdi:sprinkler-variant
sections:
  - type: grid
    cards:
      - type: grid
        columns: 5
        square: false
        cards:
          - type: custom:button-card
            entity: switch.irrabrant_zone_1
            name: Z1
            show_state: true
            state_display: |
              [[[
                return entity.state === 'on' ? 'ON' : 'OFF';
              ]]]
            icon: |
              [[[
                return entity.state === 'on' ? 'mdi:sprinkler-variant' : 'mdi:sprinkler';
              ]]]
            tap_action:
              action: more-info
            styles:
              card:
                - height: 92px
                - border-radius: 14px
                - display: flex
                - align-items: center
                - justify-content: center
                - background: |
                    [[[
                      return entity.state === 'on'
                        ? 'rgba(34, 197, 94, 0.14)'
                        : 'var(--ha-card-background)';
                    ]]]
                - border: |
                    [[[
                      return entity.state === 'on'
                        ? '1px solid rgba(34, 197, 94, 0.55)'
                        : '1px solid var(--divider-color)';
                    ]]]
              grid:
                - grid-template-areas: "\"i\" \"n\" \"s\""
                - grid-template-columns: 1fr
                - grid-template-rows: 1fr min-content min-content
                - justify-items: center
                - align-items: center
              icon:
                - width: 34px
                - color: |
                    [[[
                      return entity.state === 'on' ? '#22c55e' : 'var(--disabled-text-color)';
                    ]]]
              name:
                - text-align: center
                - font-weight: 700
                - font-size: 15px
              state:
                - text-align: center
                - font-size: 12px
                - font-weight: 600
                - color: |
                    [[[
                      return entity.state === 'on' ? '#22c55e' : 'var(--secondary-text-color)';
                    ]]]
