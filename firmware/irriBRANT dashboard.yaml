                    ]]]
        grid_options:
          rows: 1
      - type: horizontal-stack
        cards:
          - type: custom:mushroom-entity-card
            entity: switch.irrabrant_system_enabled
            name: System
            icon: mdi:power
            tap_action:
              action: toggle
          - type: custom:mushroom-number-card
            entity: number.irrabrant_rain_delay_hours
            name: Rain Delay
            icon: mdi:weather-pouring
          - type: custom:mushroom-number-card
            entity: number.irrabrant_seasonal_adjustment
            name: Seasonal
            icon: mdi:tune-variant
      - type: custom:mushroom-template-card
        primary: Irrigation Status
        secondary: |
          {% if is_state('switch.irrabrant_zone_1', 'on')
             or is_state('switch.irrabrant_zone_2', 'on')
             or is_state('switch.irrabrant_zone_3', 'on')
             or is_state('switch.irrabrant_zone_4', 'on')
             or is_state('switch.irrabrant_zone_5', 'on') %}
            Irrigating now
          {% elif is_state('switch.irrabrant_system_enabled', 'on') %}
            System active and standing by
          {% else %}
            System disabled
          {% endif %}
        icon: |
          {% if is_state('switch.irrabrant_zone_1', 'on')
             or is_state('switch.irrabrant_zone_2', 'on')
             or is_state('switch.irrabrant_zone_3', 'on')
             or is_state('switch.irrabrant_zone_4', 'on')
             or is_state('switch.irrabrant_zone_5', 'on') %}
            mdi:sprinkler-variant
          {% else %}
            mdi:sprinkler
          {% endif %}
        icon_color: |
          {% if is_state('switch.irrabrant_zone_1', 'on')
             or is_state('switch.irrabrant_zone_2', 'on')
             or is_state('switch.irrabrant_zone_3', 'on')
             or is_state('switch.irrabrant_zone_4', 'on')
             or is_state('switch.irrabrant_zone_5', 'on') %}
            green
          {% elif is_state('switch.irrabrant_system_enabled', 'on') %}
            green
          {% else %}
            grey
          {% endif %}
        entity: switch.irrabrant_system_enabled
        tap_action:
          action: toggle
        fill_container: true
      - type: custom:history-explorer-card
        cardName: irrabrant-history-overview
        header: irriBRANT History
        defaultTimeRange: 24h
        showUnavailable: true
        stateTextMode: hide
        lineMode: lines
        timelineBarHeight: 24
        timelineBarSpacing: 36
        lineGraphHeight: 150
        tooltip:
          size: slim
          showDuration: true
        uiLayout:
          toolbar: top
          selector: hide
        stateColors:
          switch.on: "#22c55e"
          switch.off: rgba(148, 163, 184, 0.20)
          unavailable: rgba(239, 68, 68, 0.35)
        graphs:
          - type: timeline
            title: Zone Runtime
            entities:
              - entity: switch.irrabrant_zone_1
                name: Zone 1
              - entity: switch.irrabrant_zone_2
                name: Zone 2
              - entity: switch.irrabrant_zone_3
                name: Zone 3
              - entity: switch.irrabrant_zone_4
                name: Zone 4
              - entity: switch.irrabrant_zone_5
                name: Zone 5
          - type: line
            title: Rain and Snow
            options:
              height: 150
              ymin: 0
            entities:
              - entity: sensor.openweathermap_rain_intensity
                name: Rain
                color: "#38bdf8"
                fill: rgba(56, 189, 248, 0.22)
                width: 3
              - entity: sensor.openweathermap_snow_intensity
                name: Snow
                color: "#e5e7eb"
                fill: rgba(229, 231, 235, 0.30)
                width: 3
          - type: line
            title: Wi-Fi Signal
            options:
              height: 130
              ymin: -100
              ymax: -30
            entities:
              - entity: sensor.irrabrant_wifi_signal
                name: Wi-Fi dBm
                color: "#22c55e"
                fill: rgba(34, 197, 94, 0.16)
                width: 3
        grid_options:
          columns: full
          rows: 12
      - type: logbook
        target:
          entity_id:
            - switch.irrabrant_irrigation
        grid_options:
          columns: full
    column_span: 4
