        cards:
          - type: entities
            title: Irrigation Control
            show_header_toggle: false
            entities:
              - entity: switch.irrabrant_active_cycle
                name: Active Cycle
              - entity: switch.irrabrant_auto_advance_zones
                name: Auto Advance Zones
              - entity: number.irrabrant_rain_delay_hours
                name: Rain Delay Hours
              - entity: number.irrabrant_rain_intensity_block_threshold
                name: Rain Intensity Block Threshold
          - type: entities
            title: Run Programs
            show_header_toggle: false
            entities:
              - entity: switch.irrabrant_run_program_a
                name: Run Program A
              - entity: switch.irrabrant_run_program_b
                name: Run Program B
              - entity: switch.irrabrant_run_program_c
                name: Run Program C
      - type: entities
        title: Zone Durations
        show_header_toggle: false
