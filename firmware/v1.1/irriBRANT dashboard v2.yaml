        icon: mdi:sprinkler-variant
        heading: irriBRANT
        heading_style: title
      - type: grid
        columns: 3
        square: false
        cards:
          - type: tile
            entity: switch.irrabrant_zone_1_valve
            name: Zone 1
            icon: mdi:sprinkler-variant
          - type: tile
            entity: switch.irrabrant_zone_2_valve
