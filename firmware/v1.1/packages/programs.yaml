    id: prog_a_hour
    name: "Prog A Start Hour"
    min_value: 0
    max_value: 23
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 6
  - platform: template
    id: prog_a_min
    name: "Prog A Start Minute"
    min_value: 0
    max_value: 59
    step: 1
    optimistic: true
    restore_value: true
    initial_value: 0

  - platform: template
