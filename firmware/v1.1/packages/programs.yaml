# =========================================================
# AUTOMATION ENGINE (INTERVAL SCHEDULER)
# =========================================================
interval:
  - interval: 1min
    then:
      - lambda: |-
          auto time = id(sntp_time).now();
          if (!time.is_valid()) return;

          // CRITICAL FIXED: Global hardware/software shutdown check. 
          // If Main Irrigation System switch is OFF, abort everything immediately.
          if (!id(main_irrigation_switch).state) {
            return;
          }

          bool rain_blocked = false;
          if (id(rain_intensity).has_state() && id(rain_threshold).has_state()) {
            if (id(rain_intensity).state >= id(rain_threshold).state) {
              rain_blocked = true;
            }
          }
          if (rain_blocked) return;

          // --- PROGRAM A CHECK ---
          if (id(program_a_enabled).state && !id(program_a_running)) {
            bool day_match = false;
            if (time.day_of_week == 1 && id(prog_a_sun).state) day_match = true;
            if (time.day_of_week == 2 && id(prog_a_mon).state) day_match = true;
            if (time.day_of_week == 3 && id(prog_a_tue).state) day_match = true;
            if (time.day_of_week == 4 && id(prog_a_wed).state) day_match = true;
            if (time.day_of_week == 5 && id(prog_a_thu).state) day_match = true;
            if (time.day_of_week == 6 && id(prog_a_fri).state) day_match = true;
            if (time.day_of_week == 7 && id(prog_a_sat).state) day_match = true;

            if (day_match && time.hour == (int)id(prog_a_hour).state && time.minute == (int)id(prog_a_min).state) {
              id(program_a_run).execute();
            }
          }

          // --- PROGRAM B CHECK ---
          if (id(program_b_enabled).state && !id(program_b_running)) {
            bool day_match = false;
            if (time.day_of_week == 1 && id(prog_b_sun).state) day_match = true;
            if (time.day_of_week == 2 && id(prog_b_mon).state) day_match = true;
            if (time.day_of_week == 3 && id(prog_b_tue).state) day_match = true;
            if (time.day_of_week == 4 && id(prog_b_wed).state) day_match = true;
            if (time.day_of_week == 5 && id(prog_b_thu).state) day_match = true;
            if (time.day_of_week == 6 && id(prog_b_fri).state) day_match = true;
            if (time.day_of_week == 7 && id(prog_b_sat).state) day_match = true;

            if (day_match && time.hour == (int)id(prog_b_hour).state && time.minute == (int)id(prog_b_min).state) {
              id(program_b_run).execute();
            }
          }

          // --- PROGRAM C CHECK ---
          if (id(program_c_enabled).state && !id(program_c_running)) {
            bool day_match = false;
            if (time.day_of_week == 1 && id(prog_c_sun).state) day_match = true;
            if (time.day_of_week == 2 && id(prog_c_mon).state) day_match = true;
            if (time.day_of_week == 3 && id(prog_c_tue).state) day_match = true;
            if (time.day_of_week == 4 && id(prog_c_wed).state) day_match = true;
            if (time.day_of_week == 5 && id(prog_c_thu).state) day_match = true;
            if (time.day_of_week == 6 && id(prog_c_fri).state) day_match = true;
            if (time.day_of_week == 7 && id(prog_c_sat).state) day_match = true;

            if (day_match && time.hour == (int)id(prog_c_hour).state && time.minute == (int)id(prog_c_min).state) {
              id(program_c_run).execute();
            }
          }