# =========================================================
# PROGRAMS
# irriBRANT PRO v1.1 - DYNAMIC ZONE SELECTION
# =========================================================

# =========================================================
# GLOBALS
# =========================================================
globals:
  - id: program_a_running
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: program_b_running
    type: bool
    restore_value: false
    initial_value: 'false'

  - id: program_c_running
    type: bool
    restore_value: false
    initial_value: 'false'

# =========================================================
# EXECUTION SCRIPTS WITH DYNAMIC QUEUING
# =========================================================
script:
  # --- PROGRAM A SCRIPT ---
  - id: program_a_run
    mode: single
    then:
      - globals.set:
          id: program_a_running
          value: 'true'
      - if:
          condition:
            lambda: 'return id(program_a_zone_1).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 0 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_2).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 1 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_3).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 2 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_4).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 3 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_5).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 4 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_6).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 5 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_7).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 6 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_8).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 7 }
      - if:
          condition:
            lambda: 'return id(program_a_zone_9).state;'
          then:
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 8 }
      - wait_until:
          condition:
            lambda: 'return !id(irribrant_controller).active_valve().has_value();'
      - globals.set:
          id: program_a_running
          value: 'false'

  # --- PROGRAM B SCRIPT ---
  - id: program_b_run
    mode: single
    then:
      - globals.set:
          id: program_b_running
          value: 'true'
      - if:
          condition: 
            lambda: 'return id(program_b_zone_1).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 0 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_2).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 1 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_3).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 2 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_4).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 3 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_5).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 4 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_6).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 5 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_7).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 6 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_8).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 7 }
      - if:
          condition: 
            lambda: 'return id(program_b_zone_9).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 8 }
      - wait_until:
          condition:
            lambda: 'return !id(irribrant_controller).active_valve().has_value();'
      - globals.set:
          id: program_b_running
          value: 'false'

  # --- PROGRAM C SCRIPT ---
  - id: program_c_run
    mode: single
    then:
      - globals.set:
          id: program_c_running
          value: 'true'
      - if:
          condition: 
            lambda: 'return id(program_c_zone_1).state;'
          then: 
            - sprinkler.queue_valve: { id: irribrant_controller, valve_number: 0 }
      - if:
