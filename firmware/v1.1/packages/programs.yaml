# =========================================================
# SWITCHES & SELECTIONS
# =========================================================
switch:
  # Manual Trigger Template Switches - FIXED: Only shutdowns active queue instead of killing global master switch
  - platform: template
    name: "Run Program A"
    id: program_a_switch
    lambda: 'return id(program_a_running);'
    turn_on_action:
      - script.execute: program_a_run
    turn_off_action:
      - script.stop: program_a_run
      - sprinkler.shutdown: irribrant_controller
      - globals.set: { id: program_a_running, value: 'false' }

  - platform: template
    name: "Run Program B"
    id: program_b_switch
    lambda: 'return id(program_b_running);'
    turn_on_action:
      - script.execute: program_b_run
    turn_off_action:
      - script.stop: program_b_run
      - sprinkler.shutdown: irribrant_controller
      - globals.set: { id: program_b_running, value: 'false' }

  - platform: template
    name: "Run Program C"
    id: program_c_switch
    lambda: 'return id(program_c_running);'
    turn_on_action:
      - script.execute: program_c_run
