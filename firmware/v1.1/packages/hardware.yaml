# =========================================================
# HARDWARE
# =========================================================

esphome:
  name: irribrant-pro
  friendly_name: irriBRANT PRO

  project:
    name: renatobrant.irribrant
    version: "1.1"

  on_boot:
    priority: 600
    then:
      - script.execute: led_boot_animation

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6

  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: !secret api_encryption_key

  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  power_save_mode: none

  ap:
    ssid: "irriBRANT Fallback"
    password: !secret fallback_ap_password

  on_connect:
    then:
      - script.execute: update_status_led

  on_disconnect:
    then:
      - script.execute: update_status_led

captive_portal:

web_server:
  port: 80

# =========================================================
# I2C
# =========================================================

i2c:
  sda: GPIO23
  scl: GPIO16

  frequency: 50000 Hz

  scan: true

# =========================================================
# MCP23017
# =========================================================

mcp23017:
  - id: mcp23017_hub
    address: 0x20

# =========================================================
# RGB LED
# =========================================================

output:

  - platform: ledc
    pin: GPIO1
    frequency: 1000Hz
    id: led_red

  - platform: ledc
    pin: GPIO0
    frequency: 1000Hz
    id: led_green

  - platform: ledc
    pin: GPIO2
    frequency: 1000Hz
    id: led_blue

light:

  - platform: rgb
    id: status_led

    internal: true

    red: led_red
    green: led_green
    blue: led_blue

    restore_mode: ALWAYS_OFF

# =========================================================
# BUTTON
# =========================================================

binary_sensor:

  - platform: status
    id: ha_connected

  - platform: gpio
    name: "Front Button"

    pin:
      number: GPIO8
      mode:
        input: true
        pullup: true

      inverted: true

    on_press:
      then:
        - logger.log: "Button pressed"