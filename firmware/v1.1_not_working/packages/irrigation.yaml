# =========================================================
# irriBRANT v1.1
# irrigation.yaml
# =========================================================

# =========================================================
# RAIN SETTINGS
# =========================================================
number:
  - platform: template
    id: rain_delay_hours
    name: "Rain Delay Hours"
    optimistic: true
    min_value: 0
    max_value: 240
    step: 1
    initial_value: 0
    restore_value: true

  - platform: template
    id: rain_threshold
    name: "Rain Intensity Block Threshold"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 20
    restore_value: true

# =========================================================
# PHYSICAL OUTPUTS & MASTER SWITCH
# =========================================================
switch:
  # --- MASTER SYSTEM ENABLE SWITCH ---
  # Atua como um "Disjuntor Lógico". Se desligado, corta a rega imediatamente
  # e o painel de automação ignorará os agendamentos.
  - platform: template
    id: main_irrigation_switch
    name: "Main Irrigation System"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_off_action:
      - switch.turn_off: sprinkler_active_cycle

  # ZONE 1 (Mapped to MCP23017 - GPB0)
  - platform: gpio
    id: zone_1_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 8  
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 2 (Botão 9 -> Z2)
  - platform: gpio
    id: zone_2_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 7  
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 3 (Botão 8 -> Z3)
  - platform: gpio
    id: zone_3_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 6
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 4 (Botão 7 -> Z4)
  - platform: gpio
    id: zone_4_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 5
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 5 (Botão 6 -> Z5)
  - platform: gpio
    id: zone_5_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 4
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 6 (Botão 5 -> Z6)
  - platform: gpio
    id: zone_6_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 3
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 7 (Botão 4 -> Z7)
  - platform: gpio
    id: zone_7_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 2
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 8 (Botão 3 -> Z8)
  - platform: gpio
    id: zone_8_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 1
    restore_mode: ALWAYS_OFF
    internal: true

  # ZONE 9 (Botão 2 -> Z9)
  - platform: gpio
    id: zone_9_output
    pin:
      mcp23xxx: mcp23017_hub
      number: 0 
    restore_mode: ALWAYS_OFF
    internal: true

# =========================================================
# IRRIGATION CONTROLLER
# =========================================================
sprinkler:
  - id: irribrant_controller
    main_switch:
      name: "Active Cycle"
      id: sprinkler_active_cycle
    auto_advance_switch: "Auto Advance Zones"
    
    valves:
      - valve_switch: "Zone 1 Valve"
        valve_switch_id: zone_1_output
        enable_switch: "Enable Zone 1"
        run_duration_number:
          id: zone_1_duration
          name: "Zone 1 Duration"
          initial_value: 10
          restore_value: true
          min_value: 1
          max_value: 180
          step: 1
          unit_of_measurement: "min"

