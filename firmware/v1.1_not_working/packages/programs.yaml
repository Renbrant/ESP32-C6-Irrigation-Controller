# =========================================================
# PROGRAMS
# =========================================================

globals:

  - id: prog_a_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: prog_b_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: prog_c_running
    type: bool
    restore_value: no
    initial_value: 'false'

script:

  # =======================================================
  # PROGRAM A
  # =======================================================

  - id: program_a_run
    mode: single

    then:

      - if:
          condition:
            lambda: |-
              return id(main_irrigation_switch).state &&
                     !id(rain_lock) &&
                     !id(irribrant_controller).active_valve().has_value();
          then:

            - globals.set:
                id: prog_a_running
                value: 'true'

            - sprinkler.start_full_cycle:
                id: irribrant_controller

            - wait_until:
                condition:
                  lambda: |-
                    return !id(irribrant_controller).active_valve().has_value();

            - globals.set:
                id: prog_a_running
                value: 'false'
          else:
            - logger.log: "Program A skipped: system disabled, rain lock active, or cycle already running"

  # =======================================================
  # PROGRAM B
  # =======================================================

  - id: program_b_run
    mode: single

    then:

      - if:
          condition:
            lambda: |-
              return id(main_irrigation_switch).state &&
                     !id(rain_lock) &&
                     !id(irribrant_controller).active_valve().has_value();
          then:

            - globals.set:
                id: prog_b_running
                value: 'true'

            - sprinkler.start_full_cycle:
                id: irribrant_controller

            - wait_until:
                condition:
                  lambda: |-
                    return !id(irribrant_controller).active_valve().has_value();

            - globals.set:
                id: prog_b_running
                value: 'false'
          else:
            - logger.log: "Program B skipped: system disabled, rain lock active, or cycle already running"

  # =======================================================
  # PROGRAM C
  # =======================================================

  - id: program_c_run
    mode: single

    then:

      - if:
          condition:
            lambda: |-
              return id(main_irrigation_switch).state &&
                     !id(rain_lock) &&
                     !id(irribrant_controller).active_valve().has_value();
          then:

            - globals.set:
                id: prog_c_running
                value: 'true'

            - sprinkler.start_full_cycle:
                id: irribrant_controller

            - wait_until:
                condition:
                  lambda: |-
                    return !id(irribrant_controller).active_valve().has_value();

            - globals.set:
                id: prog_c_running
                value: 'false'
          else:
            - logger.log: "Program C skipped: system disabled, rain lock active, or cycle already running"
