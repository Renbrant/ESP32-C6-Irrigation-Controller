# =========================================================
# irriBRANT v3.2
# weather.yaml
# =========================================================
#
# Provider-agnostic weather integration:
# Create Home Assistant Template Sensors that expose weather data from your
# preferred provider/location into these generic entity IDs:
#
# - sensor.irribrant_rain_probability_12h
#   Maximum rain probability for the next 12 hours, from 0 to 100%.
#
# - sensor.irribrant_current_rain_intensity
#   Current rain intensity, from a weather provider or a local rain sensor.
#
# The firmware only reads these generic sensors, so users can use NWS,
# OpenWeatherMap, local weather stations, Brazilian providers, or any other
# source without changing ESPHome YAML/C++ code.

# =========================================================
# GLOBALS
# =========================================================

globals:

  - id: rain_lock
    type: bool
    restore_value: true
    initial_value: 'false'

  - id: rain_delay_until
    type: int64_t
    restore_value: yes
    initial_value: '0'

# =========================================================
# WEATHER SETTINGS
# =========================================================

number:

  - platform: template
    id: rain_delay_hours
    name: "Rain Delay Hours"
    optimistic: true
    min_value: 0
    max_value: 48
    step: 1
    initial_value: 0
    restore_value: true

  - platform: template
    id: rain_probability_threshold
    name: "Rain Probability Threshold"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 60
    restore_value: true
    unit_of_measurement: "%"

  - platform: template
    id: rain_threshold
    name: "Rain Intensity Block Threshold"
    optimistic: true
    min_value: 0
    max_value: 100
    step: 1
    initial_value: 20
    restore_value: true

select:

  - platform: template
    id: rain_source
    name: "Rain Source"
    optimistic: true
    restore_value: true
    options:
      - "Disabled"
      - "Home Assistant"
      - "Local Sensor"
    initial_option: "Home Assistant"

# =========================================================
# WEATHER INPUTS FROM HOME ASSISTANT
# =========================================================

sensor:

  - platform: homeassistant
    id: rain_probability_12h
    entity_id: sensor.irribrant_rain_probability_12h
    filters:
      - clamp:
          min_value: 0
          max_value: 100

  - platform: homeassistant
    id: current_rain_intensity
    entity_id: sensor.irribrant_current_rain_intensity
    filters:
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

# =========================================================
# WEATHER STATUS
# =========================================================

binary_sensor:

  - platform: template
    id: rain_lock_status
    name: "Rain Lock"
    lambda: |-
      return id(rain_lock);

# =========================================================
# MANUAL WEATHER ACTIONS
# =========================================================

button:

  - platform: template
    name: "Apply Rain Delay"
    on_press:
      - lambda: |-
          auto now = id(ha_time).now();

          if (!now.is_valid()) {
            ESP_LOGW("weather", "Cannot apply rain delay: Home Assistant time is not valid");
            return;
          }

          if (id(rain_delay_hours).state <= 0) {
            id(rain_delay_until) = 0;
            id(rain_lock) = false;
            ESP_LOGI("weather", "Rain delay cleared");
            return;
          }

          id(rain_delay_until) = now.timestamp + (int64_t) (id(rain_delay_hours).state * 3600);
          id(rain_lock) = true;
          ESP_LOGI("weather", "Rain delay applied for %.0f hour(s)", id(rain_delay_hours).state);

  - platform: template
    name: "Clear Rain Delay"
    on_press:
      - globals.set:
          id: rain_delay_until
          value: '0'
      - globals.set:
          id: rain_lock
          value: 'false'

# =========================================================
# WEATHER LOGIC
# =========================================================

script:

  - id: refresh_rain_lock
    mode: restart
    then:
      - lambda: |-
          auto now = id(ha_time).now();
          const auto source = id(rain_source).current_option();

          if (source == "Disabled") {
            id(rain_delay_until) = 0;
            id(rain_lock) = false;
            return;
          }

          bool delay_active = false;

          if (now.is_valid()) {
            if (id(rain_delay_until) > now.timestamp) {
              delay_active = true;
            } else if (id(rain_delay_until) != 0) {
              id(rain_delay_until) = 0;
            }
          }

          const bool probability_blocks =
              id(rain_probability_12h).has_state() &&
              id(rain_probability_12h).state > id(rain_probability_threshold).state;

          const bool intensity_blocks =
              id(current_rain_intensity).has_state() &&
              id(current_rain_intensity).state > id(rain_threshold).state;

          bool weather_active = false;

          if (source == "Home Assistant") {
            weather_active = probability_blocks || intensity_blocks;
          } else if (source == "Local Sensor") {
            weather_active = intensity_blocks;
          }

          if (weather_active && now.is_valid() && id(rain_delay_hours).state > 0) {
            id(rain_delay_until) = now.timestamp + (int64_t) (id(rain_delay_hours).state * 3600);
            delay_active = true;
          }

          id(rain_lock) = delay_active || weather_active;
