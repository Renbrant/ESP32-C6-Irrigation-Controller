# =========================================================
# PROGRAMS
# =========================================================

globals:

  - id: prog_a_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: prog_b_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: prog_c_running
    type: bool
    restore_value: no
    initial_value: 'false'

  - id: cycle_repeats_remaining
    type: int
    restore_value: no
    initial_value: '0'

script:

  # =======================================================
  # PROGRAM A
  # =======================================================

  - id: program_a_run
    mode: single

    then:

      - if:
          condition:
            lambda: |-
              return id(main_irrigation_switch).state &&
                     !id(rain_lock) &&
                     !id(prog_a_running) &&
                     !id(prog_b_running) &&
                     !id(prog_c_running) &&
                     !id(irribrant_controller).active_valve().has_value() &&
                     (
                       (id(zone_1_enabled).state && id(program_a_zone_1_enabled).state) ||
                       (id(zone_2_enabled).state && id(program_a_zone_2_enabled).state) ||
                       (id(zone_3_enabled).state && id(program_a_zone_3_enabled).state) ||
                       (id(zone_4_enabled).state && id(program_a_zone_4_enabled).state) ||
                       (id(zone_5_enabled).state && id(program_a_zone_5_enabled).state) ||
                       (id(zone_6_enabled).state && id(program_a_zone_6_enabled).state) ||
                       (id(zone_7_enabled).state && id(program_a_zone_7_enabled).state) ||
                       (id(zone_8_enabled).state && id(program_a_zone_8_enabled).state) ||
                       (id(zone_9_enabled).state && id(program_a_zone_9_enabled).state)
                     );
          then:

            - globals.set:
                id: prog_a_running
                value: 'true'

            - lambda: |-
                int repeats = (int) id(program_a_cycle_count).state;
                if (repeats < 1) {
                  repeats = 1;
                } else if (repeats > 5) {
                  repeats = 5;
                }
                id(cycle_repeats_remaining) = repeats;
                id(irribrant_controller).set_valve_open_delay(
                  (uint32_t) id(program_a_transition_delay).state
                );

            - while:
                condition:
                  lambda: |-
                    return id(cycle_repeats_remaining) > 0 &&
                           id(main_irrigation_switch).state &&
                           !id(rain_lock);
                then:
                  - lambda: |-
                      id(irribrant_controller).clear_queued_valves();

                      if (id(zone_1_enabled).state && id(program_a_zone_1_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 0, (uint32_t) (id(program_a_zone_1_duration).state * 60));
                      }
                      if (id(zone_2_enabled).state && id(program_a_zone_2_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 1, (uint32_t) (id(program_a_zone_2_duration).state * 60));
                      }
                      if (id(zone_3_enabled).state && id(program_a_zone_3_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 2, (uint32_t) (id(program_a_zone_3_duration).state * 60));
                      }
                      if (id(zone_4_enabled).state && id(program_a_zone_4_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 3, (uint32_t) (id(program_a_zone_4_duration).state * 60));
                      }
                      if (id(zone_5_enabled).state && id(program_a_zone_5_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 4, (uint32_t) (id(program_a_zone_5_duration).state * 60));
                      }
                      if (id(zone_6_enabled).state && id(program_a_zone_6_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 5, (uint32_t) (id(program_a_zone_6_duration).state * 60));
                      }
                      if (id(zone_7_enabled).state && id(program_a_zone_7_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 6, (uint32_t) (id(program_a_zone_7_duration).state * 60));
                      }
                      if (id(zone_8_enabled).state && id(program_a_zone_8_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 7, (uint32_t) (id(program_a_zone_8_duration).state * 60));
                      }
                      if (id(zone_9_enabled).state && id(program_a_zone_9_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 8, (uint32_t) (id(program_a_zone_9_duration).state * 60));
                      }

                      id(irribrant_controller).start_from_queue();

                  - wait_until:
                      condition:
                        lambda: |-
                          return id(irribrant_controller).controller_state() == sprinkler::IDLE;

                  - lambda: |-
                      id(irribrant_controller).clear_queued_valves();
                      id(cycle_repeats_remaining) -= 1;

                  - if:
                      condition:
                        lambda: |-
                          return id(cycle_repeats_remaining) > 0 &&
                                 id(main_irrigation_switch).state &&
                                 !id(rain_lock);
                      then:
                        - delay: !lambda |-
                            return (uint32_t) (id(program_a_transition_delay).state * 1000);

            - lambda: |-
                id(irribrant_controller).set_valve_open_delay(0);
            - globals.set:
                id: prog_a_running
                value: 'false'
          else:
            - logger.log: "Program A skipped: system disabled, rain lock active, no selected zones, or cycle already running"

