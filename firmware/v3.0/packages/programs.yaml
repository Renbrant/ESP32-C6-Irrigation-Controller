                      }
                      if (id(zone_8_enabled).state && id(program_b_zone_8_enabled).state) {
                        id(irribrant_controller).queue_valve((size_t) 7, (uint32_t) (id(program_b_zone_8_duration).state * 60));
                      }
                      if (id(zone_9_enabled).state && id(program_b_zone_9_enabled).state) {
