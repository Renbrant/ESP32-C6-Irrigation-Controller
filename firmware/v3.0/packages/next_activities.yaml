        for (int i = 0; i < 20; i++) {
          if (next[i].start == 0 || candidate.start < next[i].start) {
            for (int j = 19; j > i; j--) {
              next[j] = next[j - 1];
            }

            next[i] = candidate;
            return;
          }
        }
      };

      auto program_duration = [&](char program) -> uint32_t {
