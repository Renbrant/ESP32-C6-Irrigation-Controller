        if (hours > 0) {
          text += to_string(hours);
          text += hours == 1 ? " hour" : " hours";
        }

        if (minutes > 0) {
          if (!text.empty()) {
            text += " ";
          }

          text += to_string(minutes);
          text += minutes == 1 ? " minute" : " minutes";
        }

        return text.empty() ? std::string("less than 1 minute") : text;
      };

      auto add_activity = [&](time_t start, const char *program, uint32_t duration) {
        if (duration == 0) {
