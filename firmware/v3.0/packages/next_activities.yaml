      if (id(rain_lock)) {
        text += "Rain lock is currently active. Scheduled runs may be skipped.\n";
      }

      for (int i = 0; i < 20; i++) {
        if (next[i].start == 0) {
          break;
        }

        ESPTime start = ESPTime::from_epoch_local(next[i].start);
        char line[96];
        snprintf(
          line,
          sizeof(line),
          "%04d-%02d-%02d %02d:%02d - %s for %s",
          start.year,
          start.month,
          start.day_of_month,
          start.hour,
          start.minute,
          next[i].program,
          format_span(next[i].duration).c_str()
