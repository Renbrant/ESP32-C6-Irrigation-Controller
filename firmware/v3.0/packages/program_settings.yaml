number:

  # -------------------------------------------------------
  # PROGRAM A
  # -------------------------------------------------------

  - platform: template
    id: program_a_cycle_count
    name: "Program A Cycle Count"
    optimistic: true
    restore_value: true
    min_value: 1
    max_value: 5
    step: 1
    initial_value: 1

