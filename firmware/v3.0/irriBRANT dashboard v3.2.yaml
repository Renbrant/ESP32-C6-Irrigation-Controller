type: sections
title: irriBRANT
path: irribrant
icon: mdi:sprinkler-variant
max_columns: 4
header:
  card:
    type: custom:button-card
    entity: switch.irribrant_pro_active_cycle
    show_icon: false
    show_name: false
    styles:
      card:
        - padding: 28px
        - border-radius: 24px
        - border: 1px solid rgba(82, 167, 255, 0.28)
        - background: >-
            linear-gradient(135deg, rgba(16, 34, 52, 0.98), rgba(13, 18, 23,
            0.98) 56%, rgba(29, 57, 40, 0.94))
        - box-shadow: 0 20px 54px rgba(0, 0, 0, 0.36)
      grid:
        - grid-template-areas: "\"title status\" \"subtitle status\""
        - grid-template-columns: 1fr auto
        - grid-template-rows: min-content min-content
        - column-gap: 24px
      custom_fields:
        title:
          - justify-self: start
          - font-size: 30px
          - font-weight: 800
          - letter-spacing: 0
          - color: white
        subtitle:
          - justify-self: start
          - margin-top: 8px
          - color: rgba(255, 255, 255, 0.72)
          - font-size: 14px
        status:
          - justify-self: end
          - align-self: center
          - padding: 10px 14px
          - border-radius: 999px
          - background: rgba(255, 255, 255, 0.10)
          - color: white
          - font-size: 13px
          - font-weight: 700
    custom_fields:
      title: irriBRANT PRO v3.2
      subtitle: Smart irrigation control, scheduling, rain delay, and zone monitoring.
      status: |
        [[[
          return entity.state === 'on' ? 'Watering now' : 'System ready';
        ]]]
badges:
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: switch.irribrant_pro_main_irrigation_system
    name: irriBRANT PRO
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: switch.irribrant_pro_active_cycle
    name: Cycle
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irribrant_pro_wifi_signal
    name: WiFi Signal
    show_entity_picture: false
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irribrant_pro_uptime
    name: Uptime
  - type: entity
    show_name: true
    show_state: true
    show_icon: true
    entity: sensor.irribrant_rain_probability_12h
    icon: mdi:weather-lightning-rainy
    name: Rain probability 24h
sections:
  - type: grid
    column_span: 4
    cards:
      - type: heading
        icon: mdi:view-dashboard
        heading: Command Center
        heading_style: title
      - type: custom:stack-in-card
        mode: vertical
        cards:
          - type: custom:mushroom-template-card
            primary: Upcoming Watering
            secondary: |
              {{ states('sensor.irribrant_pro_next_activities') }}
            icon: mdi:calendar-clock
            multiline_secondary: true
            layout: vertical
          - type: grid
            columns: 3
            square: false
            cards:
              - type: tile
                entity: switch.irribrant_pro_main_irrigation_system
                name: Main
                icon: mdi:power
                color: blue
                tap_action:
                  action: toggle
                features_position: bottom
                vertical: false
              - type: tile
                entity: switch.irribrant_pro_active_cycle
                name: Cycle
                icon: mdi:sprinkler
                color: green
                tap_action:
                  action: toggle
                features_position: bottom
                vertical: false
              - type: tile
                entity: switch.irribrant_pro_auto_advance_zones
                name: Advance
                icon: mdi:skip-next-circle
                color: blue
                tap_action:
                  action: toggle
                features_position: bottom
                vertical: false
      - type: grid
        columns: 3
        square: false
        cards:
          - type: custom:button-card
            entity: button.irribrant_pro_run_program_a
            name: Run Program A
            icon: mdi:alpha-a-circle
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.irribrant_pro_run_program_a
            styles:
              card:
                - height: 92px
                - border-radius: 18px
                - background: >-
                    linear-gradient(135deg, rgba(38, 74, 55, 0.95), rgba(23, 36,
                    30, 0.95))
              icon:
                - color: "#45d483"
              name:
                - font-weight: 800
          - type: custom:button-card
            entity: button.irribrant_pro_run_program_b
            name: Run Program B
            icon: mdi:alpha-b-circle
            tap_action:
              action: call-service
              service: button.press
              target:
                entity_id: button.irribrant_pro_run_program_b
            styles:
              card:
                - height: 92px
                - border-radius: 18px
                - background: >-
                    linear-gradient(135deg, rgba(34, 66, 88, 0.95), rgba(21, 32,
                    43, 0.95))
              icon:
                - color: "#52a7ff"
              name:
                - font-weight: 800
          - type: custom:button-card
            entity: button.irribrant_pro_run_program_c
            name: Run Program C
            icon: mdi:alpha-c-circle
            tap_action:
              action: call-service
              service: button.press
              target:
